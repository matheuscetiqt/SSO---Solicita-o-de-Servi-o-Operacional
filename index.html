<div class="login-container">

<div class="login-left">

<p>

Centralize, acompanhe e gerencie solicitações operacionais em um único ambiente.

</div>

<div class="input-group">

<label>Senha</label>

<input type="password" placeholder="********">

</div>

<button>

Entrar

</button>

</form>

</div>

</div>

</div>
